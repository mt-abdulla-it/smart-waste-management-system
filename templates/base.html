<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Waste Management{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-panel">
            <div class="logo">
                <h2>🌍 EcoSync</h2>
                <p>Smart Waste Management</p>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}" class="nav-item">🏠 Home</a></li>
                <li><a href="{{ url_for('dashboard') }}" class="nav-item">📊 Dashboard</a></li>
                <li><a href="{{ url_for('routes_page') }}" class="nav-item">📍 Optimized Routes</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header glass-panel">
                <div class="header-title">
                    <h1>{% block header %}Overview{% endblock %}</h1>
                </div>
                <div class="user-profile">
                    <span>Admin User</span>
                    <div class="avatar"></div>
                </div>
            </header>
            
            <section class="content">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
